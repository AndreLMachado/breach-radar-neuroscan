services:
  db:
    image: postgres:16
    container_name: breach_radar_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: breach_radar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d breach_radar"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: breach_radar_app
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/breach_radar
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
