name: CI

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/breach_radar

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: breach_radar
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d breach_radar"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Create database tables
        run: |
          python create_tables.py

      - name: Run lint
        run: |
          ruff check .

      - name: Run tests
        run: |
          pytest -v
